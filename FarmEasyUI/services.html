<!DOCTYPE html>
<html lang="en">
<head>
    <title>Services</title>
</head>
<body>
    <div>
        <h1 align="center">Services</h1><hr>
        FarmEasy website provides services for Farmer ans Buyers.

        <h3>For Farmer:</h3>
        <ol>
            <li title="Farmer can sell crops directly to the users without any extra charges or extra selling steps ">Selling Crops</li>
            <li title="FarmEasy is responsible to transport the crop from farmer to the buyer">Transportation service</li>
            <li title="FarmEasy provides service to store the farmer crop">Warehouse service</li>
            <li>Job offer service</li>
        </ol>
        <h3>For Buyer:</h3>
        <ol>
            <li title="Buyer can buy crops from the farmer directly without any extra charges or extra buying steps ">Buying Crops</li>
            <li title="FarmEasy is responsible to deliver the crops ordered from farmers to Buyers">Delivery service</li>
            <li>Job offer</li>
        </ol>
    </div>
</body>
